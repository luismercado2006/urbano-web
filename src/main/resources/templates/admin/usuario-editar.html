<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuario</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background-color: #f5f6fa;
        }
        .form-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-save {
            background-color: #0d6efd;
            color: white;
        }
        .btn-save:hover {
            background-color: #0b5ed7;
        }
        .btn-cancel {
            background-color: #6c757d;
            color: white;
        }
        .btn-cancel:hover {
            background-color: #5c636a;
        }
    </style>
</head>

<body>

<div class="container mt-4">
    <h2 class="text-center mb-4">Editar Usuario</h2>

    <div class="form-card mx-auto col-md-6">

        <form th:action="@{/admin/usuarios/guardar}" method="post" th:object="${usuario}">

            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Nombre:</label>
                <input class="form-control" th:field="*{nombre}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Apellido:</label>
                <input class="form-control" th:field="*{apellido}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Correo Electrónico:</label>
                <input type="email" class="form-control" th:field="*{correo}" required>
            </div>


            <div class="mb-3">
                <label class="form-label">Rol:</label>

                <input class="form-control"
                       th:if="${not #lists.isEmpty(usuario.roles)}"
                       th:value="${usuario.roles[0].nombre}"
                       readonly>

                <input class="form-control"
                       th:if="${#lists.isEmpty(usuario.roles)}"
                       value="(Sin Rol Asignado)"
                       readonly>

            </div>

            <div class="d-flex justify-content-between">
                <a href="/admin/listar-usuarios" class="btn btn-cancel">Cancelar</a>
                <button type="submit" class="btn btn-save">Guardar Cambios</button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
