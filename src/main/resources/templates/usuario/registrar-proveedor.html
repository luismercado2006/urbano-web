<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Urban Flair</title>
    <link rel="stylesheet" th:href="@{/css/styleUsuario.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<div class="user-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">
            <img th:src="@{/img/Logo_UrbanFlair.png}" alt="Logo Urban Flair">
        </div>

        <nav class="menu">
            <a th:href="@{/usuario}"><i class="bi bi-house"></i> Inicio</a>
            <a th:href="@{/usuario/registrar-proveedor}" class="active"><i class="bi bi-truck"></i> Registrar Proveedor</a>
            <a th:href="@{/usuario/registrar-producto}"><i class="bi bi-box"></i> Registrar Producto</a>
            <a th:href="@{/usuario/registrar-venta}"><i class="bi bi-cash-stack"></i> Registrar Venta</a>
            <a th:href="@{/usuario/mis-ventas}"><i class="bi bi-receipt"></i> Mis Ventas</a>
            <a th:href="@{/usuario/inventario}"><i class="bi bi-archive"></i> Inventario</a>
            <a th:href="@{/usuario/perfil}"><i class="bi bi-person-circle"></i> Perfil</a>
        </nav>

        <a href="#" class="logout" onclick="confirmLogout(event)">
            <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
        </a>

        <script>
            function confirmLogout(event) {
                event.preventDefault();

                Swal.fire({
                    title: '¿Cerrar sesión?',
                    text: "Tu sesión actual se cerrará.",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#3085d6',
                    cancelButtonColor: '#d33',
                    confirmButtonText: 'Sí, salir',
                    cancelButtonText: 'Cancelar'
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = '/logout';
                    }
                });
            }
        </script>
    </aside>

    <style>
        /* ======== CONTENIDO PRINCIPAL ======== */
        .main-content {
            flex: 1;
            padding: 2rem 3rem;
            background-color: #f4f7fc;
        }

        .form-container {
            background: #fff;
            padding: 2.5rem 3rem;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            max-width: 950px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-header {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #0a3d91;
            margin-bottom: 2rem;
        }

        .form-header h2 {
            font-size: 1.6rem;
            font-weight: 700;
        }

        /* ======== DISTRIBUCIÓN DE CAMPOS ======== */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            column-gap: 3rem;   /* espacio horizontal entre campos */
            row-gap: 1.5rem;
        }


        .form-group.full-width {
            grid-column: 1 / 4;
        }

        /* ======== CAMPOS ======== */
        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: #0a3d91;
            margin-bottom: 0.45rem;
            display: block;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #d4d7dd;
            border-radius: 10px;
            font-size: 0.97rem;
            background-color: #fafafa;
            transition: 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            background-color: #fff;
            border-color: #0a3d91;
            box-shadow: 0 0 0 3px rgba(10, 61, 145, 0.15);
        }

        .form-group textarea {
            resize: none;
            min-height: 100px;
        }

        /* ======== BOTONES ======== */
        .form-actions {
            margin-top: 2.5rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.8rem 1.8rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background-color: #0a3d91;
            color: #fff;
        }

        .btn-primary:hover {
            background-color: #0d46a6;
        }

        .btn-secondary {
            background-color: #d4d7dd;
            color: #333;
        }

        .btn-secondary:hover {
            background-color: #c3c7ce;
        }

        /* ======== RESPONSIVE ======== */
        @media (max-width: 900px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
                column-gap: 1.5rem;
            }

            .form-group.full-width {
                grid-column: 1 / 3;
            }
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
                row-gap: 1.2rem;
            }

            .form-group.full-width {
                grid-column: 1 / 2;
            }

            .form-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .btn {
                justify-content: center;
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.55);
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(2px);
            z-index: 2000;
            animation: fadeIn 0.3s ease-in-out;
        }

        .modal-box {
            background: #fff;
            padding: 2rem 2.5rem;
            border-radius: 18px;
            width: 400px;
            text-align: center;
            animation: popIn 0.35s ease-in-out;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-box h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: #0a3d91;
        }

        .modal-box i {
            font-size: 3rem;
            color: #28a745;
            margin-bottom: 15px;
        }

        .modal-btn {
            margin-top: 1rem;
            padding: 0.7rem 1.5rem;
            background: #0a3d91;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .modal-btn:hover {
            background: #0d46a6;
        }


    </style>



    <!-- CONTENIDO -->
    <main class="main-content">

        <div class="form-container">

            <div class="form-header">
                <h2><i class="bi bi-truck"></i> Registrar Proveedor</h2>
            </div>

            <form th:action="@{/usuario/proveedor/guardar}" method="post">

                <div class="form-grid">

                    <div class="form-group">
                        <label for="nombre"><i class="bi bi-person"></i> Nombre</label>
                        <input type="text" id="nombre" name="nombre" required placeholder="Ingrese el nombre">
                    </div>

                    <div class="form-group">
                        <label for="apellido"><i class="bi bi-person-badge"></i> Apellido</label>
                        <input type="text" id="apellido" name="apellido" required placeholder="Ingrese el apellido">
                    </div>

                    <div class="form-group">
                        <label for="email"><i class="bi bi-envelope"></i> Email</label>
                        <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
                    </div>

                    <div class="form-group">
                        <label for="telefono"><i class="bi bi-telephone"></i> Teléfono</label>
                        <input type="tel" id="telefono" name="telefono" required placeholder="+57 300 123 4567">
                    </div>

                    <div class="form-group full-width">
                        <label for="direccion"><i class="bi bi-geo-alt"></i> Dirección</label>
                        <textarea id="direccion" name="direccion" required placeholder="Ingrese la dirección completa del proveedor"></textarea>
                    </div>

                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary"
                            onclick="window.location.href='/usuario'">
                        <i class="bi bi-x-circle"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i> Guardar
                    </button>
                </div>

            </form>

        </div>
        <div th:if="${mensaje}" class="modal-overlay">
            <div class="modal-box">
                <i class="bi bi-check-circle-fill"></i>
                <h3 th:text="${mensaje}"></h3>

                <button class="modal-btn" onclick="cerrarModal()">Aceptar</button>
            </div>
        </div>


    </main>

</div>

<script>
    function cerrarModal() {
        document.querySelector(".modal-overlay").style.display = "none";
    }
</script>

</body>
</html>
