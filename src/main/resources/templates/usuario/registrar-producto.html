<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Urban Flair</title>
    <link rel="stylesheet" th:href="@{/css/styleUsuario.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        /* ======== CONTENIDO PRINCIPAL ======== */
        .main-content {
            flex: 1;
            padding: 2rem 3rem;
            background-color: #f4f7fc;
        }

        .form-container {
            background: #fff;
            padding: 2.5rem 3rem;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            max-width: 950px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-header {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #0a3d91;
            margin-bottom: 2rem;
        }

        .form-header h2 {
            font-size: 1.6rem;
            font-weight: 700;
        }

        /* ======== DISTRIBUCIÓN DE CAMPOS ======== */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            column-gap: 3rem;
            row-gap: 1.5rem;
        }

        .form-group.full-width {
            grid-column: 1 / 4;
        }

        /* ======== CAMPOS ======== */
        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: #0a3d91;
            margin-bottom: 0.45rem;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #d4d7dd;
            border-radius: 10px;
            font-size: 0.97rem;
            background-color: #fafafa;
            transition: 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            background-color: #fff;
            border-color: #0a3d91;
            box-shadow: 0 0 0 3px rgba(10, 61, 145, 0.15);
        }

        /* ======== BOTONES ======== */
        .form-actions {
            margin-top: 2.5rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.8rem 1.8rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background-color: #0a3d91;
            color: #fff;
        }

        .btn-primary:hover {
            background-color: #0d46a6;
        }

        .btn-secondary {
            background-color: #d4d7dd;
            color: #333;
        }

        .btn-secondary:hover {
            background-color: #c3c7ce;
        }

        /* ======== RESPONSIVE ======== */
        @media (max-width: 900px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
                column-gap: 1.5rem;
            }

            .form-group.full-width {
                grid-column: 1 / 3;
            }
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
                row-gap: 1.2rem;
            }

            .form-group.full-width {
                grid-column: 1 / 2;
            }

            .form-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .btn {
                justify-content: center;
            }
        }

        /* ======== MODAL PROVEEDORES ======== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.55);
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(2px);
            z-index: 2000;
            animation: fadeIn 0.3s ease-in-out;
        }

        .modal-proveedor {
            background: #fff;
            padding: 1.25rem;
            border-radius: 12px;
            width: 420px;
            max-width: 95%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .modal-proveedor h3 {
            margin: 0 0 10px 0;
            color: #0a3d91;
        }

        .modal-proveedor .search {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .modal-proveedor .list {
            max-height: 260px;
            overflow: auto;
            border-radius: 8px;
            border: 1px solid #e6e9ef;
        }

        .prov-row {
            padding: 10px 12px;
            border-bottom: 1px solid #f1f3f6;
            cursor: pointer;
        }

        .prov-row:hover {
            background: #eef3ff;
        }

        .no-results {
            padding: 12px;
            text-align: center;
            color: #777;
            font-size: 0.95rem;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 10px;
        }

        /* ======== MODAL CONFIRMACION ======== */
        .modal-box {
            background: #fff;
            padding: 2rem;
            border-radius: 15px;
            width: 380px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            animation: fadeIn 0.3s ease-in-out;
        }

        .modal-box i {
            font-size: 3rem;
            color: #0a8a1f;
            margin-bottom: 1rem;
        }

        .modal-box h3 {
            margin-bottom: 1rem;
            color: #0a3d91;
            font-size: 1.25rem;
        }

        .modal-btn {
            margin-top: 1rem;
            background: #0a3d91;
            color: #fff;
            border: none;
            padding: 0.7rem 1.6rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .modal-btn:hover {
            background: #0d46a6;
        }
    </style>
</head>

<body>
<div class="user-container">

    <!-- ======== SIDEBAR ======== -->
    <aside class="sidebar">
        <div class="logo">
            <img th:src="@{/img/Logo_UrbanFlair.png}" alt="Logo Urban Flair">
        </div>

        <nav class="menu">
            <a th:href="@{/usuario}"><i class="bi bi-house"></i> Inicio</a>
            <a th:href="@{/usuario/registrar-proveedor}"><i class="bi bi-truck"></i> Registrar Proveedor</a>
            <a th:href="@{/usuario/registrar-producto}" class="active"><i class="bi bi-box"></i> Registrar Producto</a>
            <a th:href="@{/usuario/registrar-venta}"><i class="bi bi-cash-stack"></i> Registrar Venta</a>
            <a th:href="@{/usuario/mis-ventas}"><i class="bi bi-receipt"></i> Mis Ventas</a>
            <a th:href="@{/usuario/inventario}"><i class="bi bi-archive"></i> Inventario</a>
            <a th:href="@{/usuario/perfil}"><i class="bi bi-person-circle"></i> Perfil</a>
        </nav>

        <a href="#" class="logout" onclick="confirmLogout(event)">
            <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
        </a>

        <script>
            function confirmLogout(event) {
                event.preventDefault();

                Swal.fire({
                    title: '¿Cerrar sesión?',
                    text: "Tu sesión actual se cerrará.",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#3085d6',
                    cancelButtonColor: '#d33',
                    confirmButtonText: 'Sí, salir',
                    cancelButtonText: 'Cancelar'
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = '/logout';
                    }
                });
            }
        </script>
    </aside>

    <!-- ======== CONTENIDO ======== -->
    <main class="main-content">
        <div class="form-container">

            <div class="form-header">
                <h2><i class="bi bi-box-seam"></i> Registrar Producto</h2>
            </div>

            <form th:action="@{/usuario/producto/guardar}" method="post">

                <div class="form-grid">

                    <div class="form-group">
                        <label for="categoria"><i class="bi bi-tags"></i> Categoría</label>
                        <select id="categoria" name="categoria" required>
                            <option value="">Seleccione una categoría</option>
                            <option value="Suéter">Suéter</option>
                            <option value="Pantalón">Pantalón</option>
                            <option value="Camisa">Camisa</option>
                            <option value="Buso">Buso</option>
                            <option value="Camiseta">Camiseta</option>
                            <option value="Chaqueta">Chaqueta</option>
                            <option value="Jeans">Jeans</option>
                            <option value="Sudadera">Sudadera</option>
                            <option value="Short">Short</option>
                            <option value="Falda">Falda</option>
                            <option value="Vestido">Vestido</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="descripcion"><i class="bi bi-pencil"></i> Descripción</label>
                        <input type="text" id="descripcion" name="descripcion" required placeholder="Ingrese una descripción">
                    </div>

                    <div class="form-group">
                        <label for="color"><i class="bi bi-palette"></i> Color</label>
                        <input type="text" id="color" name="color" required placeholder="Ej: Azul, Rojo...">
                    </div>

                    <div class="form-group">
                        <label for="marca"><i class="bi bi-bookmark"></i> Marca</label>
                        <input type="text" id="marca" name="marca" required placeholder="Ingrese la marca">
                    </div>

                    <div class="form-group">
                        <label for="talla"><i class="bi bi-rulers"></i> Talla</label>
                        <select id="talla" name="talla" required>
                            <option value="">Seleccione una talla</option>
                            <option value="XS">XS</option>
                            <option value="S">S</option>
                            <option value="M">M</option>
                            <option value="L">L</option>
                            <option value="XL">XL</option>
                            <option value="XXL">XXL</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="stock"><i class="bi bi-box"></i> Stock</label>
                        <input type="number" id="stock" name="stock" min="0" required placeholder="0">
                    </div>

                    <div class="form-group">
                        <label for="valorProdu"><i class="bi bi-currency-dollar"></i> Valor(Por Producto)</label>
                        <input type="number" id="valorProdu" name="valorProdu" step="0.01" min="0" required placeholder="0.00">
                    </div>

                    <!-- === BLOQUE PROVEEDOR === -->
                    <div class="form-group full-width">
                        <label for="proveedorNombre"><i class="bi bi-person-badge"></i> Seleccione Proveedor</label>

                        <div style="display:flex; gap:8px; align-items:center;">
                            <input type="text" id="proveedorNombre" name="proveedorNombre" readonly
                                   placeholder="Ninguno seleccionado" style="flex:1;">

                            <input type="hidden" id="proveedorId" name="proveedorId" required>

                            <button type="button" class="btn btn-primary" onclick="abrirModalProveedor()">
                                <i class="bi bi-search"></i>
                            </button>
                        </div>
                    </div>

                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary"
                            onclick="window.location.href='/usuario'">
                        <i class="bi bi-x-circle"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i> Guardar
                    </button>
                </div>

            </form>
        </div>

        <div th:if="${mensaje}" class="modal-overlay">
            <div class="modal-box">
                <i class="bi bi-check-circle-fill"></i>
                <h3 th:text="${mensaje}"></h3>

                <button class="modal-btn" onclick="cerrarModal()">Aceptar</button>
            </div>
        </div>
    </main>
</div>

<!-- ======== MODAL PROVEEDORES COMPLETO ======== -->
<div id="modalProveedores" class="modal-overlay" style="display:none;">
    <div class="modal-proveedor" role="dialog" aria-modal="true" aria-labelledby="modalProvTitle">
        <h3 id="modalProvTitle">Seleccionar proveedor</h3>

        <div class="search">
            <input id="buscarProv" type="text" placeholder="Buscar por nombre..." style="flex:1; padding:8px; border-radius:8px; border:1px solid #e6e9ef;">
            <button class="btn btn-secondary" onclick="cerrarModalProveedor()">Cancelar</button>
        </div>

        <div class="list" id="listaProveedores">

            <!-- CADA PROVEEDOR AHORA MUESTRA NOMBRE + APELLIDO + DIRECCIÓN -->
            <div class="prov-row"
                 th:each="prov : ${proveedores}"
                 th:data-id="${prov.id}"
                 th:data-nombre="${prov.nombre} + ' ' + ${prov.apellido}"
                 th:data-direccion="${prov.direccion}"
                 onclick="seleccionarProveedor(this)">

                <strong th:text="${prov.nombre} + ' ' + ${prov.apellido}">Nombre Apellido</strong><br>
                <small th:text="${prov.direccion}">Dirección</small>
            </div>

            <!-- MENSAJE CUANDO NO HAY RESULTADOS -->
            <div id="noResultProv" class="no-results" style="display:none;">
                No se encontraron proveedores.
            </div>

        </div>

        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="cerrarModalProveedor()">Cerrar</button>
        </div>
    </div>
</div>

<script>
    function cerrarModal() {
        const mo = document.querySelector(".modal-overlay");
        if (mo) mo.style.display = "none";
    }

    /* ===== MODAL PROVEEDORES ===== */
    function abrirModalProveedor() {
        document.getElementById("modalProveedores").style.display = "flex";
        const b = document.getElementById("buscarProv");
        if (b) b.value = '';
        filtrarProveedores('');
    }

    function cerrarModalProveedor() {
        document.getElementById("modalProveedores").style.display = "none";
    }

    function seleccionarProveedor(el) {
        const id = el.dataset.id;
        const nombre = el.dataset.nombre;

        document.getElementById('proveedorId').value = id;
        document.getElementById('proveedorNombre').value = nombre;

        cerrarModalProveedor();
    }

    // Buscador en tiempo real
    const buscarInput = document.getElementById('buscarProv');
    if (buscarInput) {
        buscarInput.addEventListener('keyup', function() {
            filtrarProveedores(this.value);
        });
    }

    function filtrarProveedores(texto) {
        texto = (texto || '').toLowerCase();

        const filas = document.querySelectorAll('#listaProveedores .prov-row');
        let visibles = 0;

        filas.forEach(f => {
            const t = (f.textContent || '').toLowerCase();
            const match = t.includes(texto);
            f.style.display = match ? '' : 'none';
            if (match) visibles++;
        });

        document.getElementById("noResultProv").style.display = visibles === 0 ? "block" : "none";
    }
</script>

</body>
</html>
